services:
  autostream:
    image: ghcr.io/l-zwlw/autostream:nightly
    container_name: autostream
    ports:
      - "7001:7001"
    environment:
      PORT: "7001"
      QBITTORRENT_URL: "http://qbittorrent:7002"
      DOWNLOADS_PATH: "/downloads"
    volumes:
      - ./data:/app/data
      - ./downloads:/downloads
    depends_on:
      - qbittorrent
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: autostream-qbittorrent
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Amsterdam"
      WEBUI_PORT: "7002"
      TORRENTING_PORT: "6881"
    ports:
      - "127.0.0.1:7002:7002"
      - "6882:6881"
      - "6882:6881/udp"
    volumes:
      - ./qbittorrent:/config
      - ./downloads:/downloads
    depends_on:
      qbittorrent-init:
        condition: service_completed_successfully
    restart: unless-stopped

  qbittorrent-init:
    image: alpine:3.22
    container_name: autostream-qbittorrent-init
    user: root
    volumes:
      - ./qbittorrent:/config
    command:
      - /bin/sh
      - -c
      - |
        config="/config/qBittorrent/qBittorrent.conf"
        mkdir -p "$$(dirname "$$config")"
        touch "$$config"

        if ! grep -q '^WebUI\\AuthSubnetWhitelistEnabled=' "$$config"; then
          printf '\n[Preferences]\nWebUI\\AuthSubnetWhitelist=172.16.0.0/12\nWebUI\\AuthSubnetWhitelistEnabled=true\n' >> "$$config"
        fi

        chown -R 1000:1000 /config
        echo "qBittorrent configured for AutoStream"
    restart: "no"
