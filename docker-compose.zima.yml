services:
  autostream:
    image: ghcr.io/l-zwlw/autostream:nightly
    container_name: autostream
    ports:
      - "7001:7001"
    environment:
      PORT: "7001"
      QBITTORRENT_URL: "http://qbittorrent:7002"
      DOWNLOADS_PATH: "/downloads"
    volumes:
      - ./data:/app/data
      - ./downloads:/downloads
    depends_on:
      - qbittorrent
    restart: unless-stopped

  qbittorrent:
    image: ghcr.io/l-zwlw/autostream-qbittorrent:nightly
    container_name: autostream-qbittorrent
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Amsterdam"
      WEBUI_PORT: "7002"
      TORRENTING_PORT: "6881"
    ports:
      - "127.0.0.1:7002:7002"
      - "6882:6881"
      - "6882:6881/udp"
    volumes:
      - ./qbittorrent:/config
      - ./downloads:/downloads
    restart: unless-stopped
